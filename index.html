async function carregarKML(){

  const file =
    document.getElementById("kmlFile").files[0];

  if(!file){
    return alert("Selecione um KML");
  }

  status.innerText =
    "Lendo KML...";

  const texto = await file.text();

  const parser = new DOMParser();

  const xml = parser.parseFromString(
    texto,
    "text/xml"
  );

  status.innerText =
    "Convertendo GeoJSON...";

  const geojson = toGeoJSON.kml(xml);

  // NORMALIZA FEATURES
  const features = geojson.features.map(f => {

    const props = f.properties || {};

    return {

      type: "Feature",

      properties: {

        name:
          props.name || "",

        tipo: (() => {

  const texto = JSON.stringify(props)
    .toUpperCase();

  if(texto.includes("CHAVE")){
    return "Chave";
  }

  if(texto.includes("RELIG")){
    return "Religador";
  }

  if(texto.includes("TRECHO")){
    return "Trecho";
  }

  if(texto.includes("TRANSF")){
    return "Transformador";
  }

  if(texto.includes("REGUL")){
    return "Regulador";
  }

  if(texto.includes("CAPAC")){
    return "Capacitor";
  }

  return "Componente";

})(),

        alimentador:
          props.alimentador ||
          props.Alimentador ||
          "",

        camada:
          props.layer ||
          props.camada ||
          "Geral"

      },

      geometry: f.geometry

    };

  });

  status.innerText =
    "Enviando para o banco...";

  const res = await fetch(
    "https://despacholinhaviva.pedro-fillype.workers.dev/upload-kml",
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify(features)
    }
  );

  const json = await res.json();

  if(!json.ok){
    throw new Error(json.erro);
  }

  status.innerText =
    json.total +
    " componentes salvos";

  alert(
    json.total +
    " componentes importados"
  );
  document.getElementById("btnCamadas")
  .style.display = "block";
  await carregarComponentes();
}
  async function carregarComponentes(){

  const alim = selectAlim.items;

  // remove layers antigas
  Object.values(layersComponentes)
    .forEach(l=>{
      map.removeLayer(l);
    });

  layersComponentes = {};

  const res = await fetch(
  "https://despacholinhaviva.pedro-fillype.workers.dev/api/tipos-componentes"
);

const json = await res.json();

const tipos = json.dados.map(
  t => t.tipo
);

  const div =
    document.getElementById("camadas");

  div.innerHTML = "";

  for(const tipo of tipos){

    const id =
      "camada_" + tipo;

    div.innerHTML += `
      <label class="camada-item"
        display:flex;
        align-items:center;
        gap:8px;
        margin-top:8px;
        font-size:13px;
      ">
        <input
          type="checkbox"
          id="${id}"
          data-tipo="${tipo}"
        >

        ${tipo}
      </label>
    `;

  }

}
 async function toggleComponente(tipo){

  const checkbox =
    document.querySelector(
      `[data-tipo="${tipo}"]`
    );

  // remove
  if(
    layersComponentes[tipo]
  ){

    map.removeLayer(
      layersComponentes[tipo]
    );

    delete layersComponentes[tipo];

    return;

  }

  // loading
  checkbox.disabled = true;

  const alim = selectAlim.items;

  const params =
    new URLSearchParams();

  params.append("tipo", tipo);

  alim.forEach(a=>{
    params.append("alim", a);
  });

  try {

    const res = await fetch(
      "https://despacholinhaviva.pedro-fillype.workers.dev/api/componentes?" +
      params.toString()
    );

    const json = await res.json();

    const geojson = {

      type:"FeatureCollection",

      features: json.dados.map(c => ({

        type:"Feature",

        properties:{
          nome:c.nome,
          tipo:c.tipo
        },

        geometry: JSON.parse(c.geojson)

      }))

    };

    const layer = L.geoJSON(
      geojson,
      {

        style: feature => {

          // linhas
          if(
            feature.geometry.type
              .includes("Line")
          ){

            return {
              color:"#22c55e",
              weight:2
            };

          }

        },

        pointToLayer:
          (feature,latlng)=>{

          let cor = "#3b82f6";

          if(tipo==="Chave"){
            cor="#facc15";
          }

          if(tipo==="Religador"){
            cor="#ef4444";
          }

          if(tipo==="Transformador"){
            cor="#22c55e";
          }

          return L.circleMarker(
            latlng,
            {
              radius:5,
              fillColor:cor,
              color:"#fff",
              weight:1,
              fillOpacity:1
            }
          );

        },

        onEachFeature:
          (feature,layer)=>{

          layer.bindPopup(`
            <b>Componente:</b>
            ${feature.properties.nome}<br>

            <b>Tipo:</b>
            ${feature.properties.tipo}
          `);

        }

      }
    );

    layer.addTo(map);

    layersComponentes[tipo] =
      layer;

  } catch(err){

    console.error(err);

    alert(
      "Erro ao carregar " + tipo
    );

  } finally {

    checkbox.disabled = false;

  }

}


/* MAP */
function init(){
  map = L.map('map').setView([-7.12,-36.5],7);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png')
    .addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius: 100,
    disableClusteringAtZoom: 20,
    spiderfyOnMaxZoom: true,
    spiderLegPolylineOptions: {
    weight: 1.5,
    color: "#94a3b8",
    opacity: 0.7
  },
    // 🔥 ISSO MUDA O FORMATO
  spiderfyDistanceMultiplier: 3, // mais aberto
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    chunkedLoading: true,

    iconCreateFunction: function (cluster) {
      const count = cluster.getChildCount();

      let size = 40;
      if (count > 50) size = 50;
      if (count > 100) size = 60;

      return L.divIcon({
        html: `<div style="
          background:#1e293b;
          color:white;
          border-radius:50%;
          width:${size}px;
          height:${size}px;
          display:flex;
          align-items:center;
          justify-content:center;
          font-weight:bold;
          border:2px solid #22c55e;
        ">${count}</div>`,
        className: "",
        iconSize: [size, size]
      });
    }
  });

  // 🔥 ===== NOVO: DESENHO =====
  drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);

  const drawControl = new L.Control.Draw({
    draw: {
      polygon: true,
      rectangle: true,
      circle: false,
      marker: false,
      polyline: false
    },
    edit: {
      featureGroup: drawnItems
    }
  });

  map.addControl(drawControl);

  // 🔥 CAPTURA DA ÁREA
  map.on(L.Draw.Event.CREATED, function (e) {

  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);

  const selecionados = [];

  const tipo = e.layerType;

  cluster.eachLayer(m => {

    const latlng = m.getLatLng();

    if (tipo === "rectangle") {
      if (e.layer.getBounds().contains(latlng)) {
        selecionados.push(m.options.dados);
      }
    }

    if (tipo === "polygon") {
      if (pointInPolygon(latlng, e.layer.getLatLngs()[0])) {
        selecionados.push(m.options.dados);
      }
    }

  });

  gerarSGM(selecionados);
});

  map.addLayer(cluster);
  cluster.on('spiderfied', function (e) {
  console.log("Expandido:", e.cluster.getAllChildMarkers().length);
  });
  cluster.on('clusterclick', function (a) {

  const markers = a.layer.getAllChildMarkers();

  mostrarListaOS(markers);

});
}

  function pointInPolygon(point, polygon) {
  const x = point.lng;
  const y = point.lat;
  let inside = false;

  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].lng, yi = polygon[i].lat;
    const xj = polygon[j].lng, yj = polygon[j].lat;

    const intersect = ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-12) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}
/* 🔥 NOVO: GERAR SGM */
/* 🔥 NOVO: GERAR SGM */
function gerarSGM(lista){

  if(!lista.length){
    alert("Nenhum ponto selecionado");
    return;
  }

  const sgms = lista
    .map(p => p.sgm)
    .filter(Boolean);

  const texto = sgms.join(", ");

  // mostra no painel
  document.getElementById("listaOS").innerText = texto;

  // copia automaticamente
  navigator.clipboard.writeText(texto);

  alert("SGMs copiados!");
}
  
/* COR */
function corTipo(tipo){
  if(!tipo) return "#94a3b8";
  if(!coresTipo[tipo]){
    coresTipo[tipo] = paleta[Object.keys(coresTipo).length % paleta.length];
  }
  return coresTipo[tipo];
}

/* LEGENDA */
function atualizarLegenda(){

  if (legendaControl) map.removeControl(legendaControl);

  legendaControl = L.control({position:"bottomright"});

  legendaControl.onAdd = function(){
    const div = L.DomUtil.create("div","legend-box");

    let html="<b>Tipos</b><br>";

    Object.entries(coresTipo).forEach(([t,c])=>{
      html+=`
        <div style="margin-top:4px;">
          <span style="background:${c};width:10px;height:10px;display:inline-block;margin-right:6px"></span>
          ${t}
        </div>`;
    });

    div.innerHTML=html;
    return div;
  };

  legendaControl.addTo(map);
}

/* UPLOAD */
function enviar(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = e=>{
    const wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const json = XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]],
      {
        defval: ""
      }
    );

    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://despacholinhaviva.pedro-fillype.workers.dev/upload");

    xhr.upload.onprogress = e=>{
      if(e.lengthComputable){
        const p = Math.round((e.loaded/e.total)*100);
        bar.style.width=p+"%";
        bar.innerText=p+"%";
      }
    };

    xhr.onload=()=>{ status.innerText="Upload OK"; carregar(); };
    xhr.setRequestHeader(
  "Content-Type",
  "application/json"
);

xhr.send(JSON.stringify(json));
  };

  reader.readAsArrayBuffer(file);
}

/* FILTROS */
function preencher(id,set){

  const valores =
    [...set].sort();

  // alimentador
  if(id === "alim"){

    selectAlim.clear();
    selectAlim.clearOptions();

    valores.forEach(v=>{

      selectAlim.addOption({
        value:v,
        text:v
      });

    });

    selectAlim.refreshOptions(false);

    return;
  }

  // normal
  const el =
    document.getElementById(id);

  el.innerHTML =
    '<option value="">Todos</option>';

  valores.forEach(v=>{

    el.innerHTML += `
      <option>${v}</option>
    `;

  });

}

async function carregar(){

// =========================
// FILTROS

const busca = document

const crit =
  document.getElementById("crit").value;

const tipo =
  document.getElementById("tipo").value;

const soma =
  document.getElementById("soma").value;

const sgm = document
  .getElementById("sgm")
  .value
  .trim()
  .toUpperCase();

const alim = selectAlim.items;

// =========================
// PARAMS
// =========================

const params = new URLSearchParams();

if(busca){
  params.append("busca", busca);
}

if(crit){
  params.append("crit", crit);
}

if(tipo){
  params.append("tipo", tipo);
}

if(soma){
  params.append("soma", soma);
}

if(sgm){
  params.append("sgm", sgm);
}

alim.forEach(a=>{
  params.append("alim", a);
});

// =========================
// FETCH
// =========================

let dados = [];

try {

  const res = await fetch(
    "https://despacholinhaviva.pedro-fillype.workers.dev/api/dados?" +
    params.toString()
  );

  const json = await res.json();

  dados = json.dados || [];

} catch(err){

  console.error(err);

  alert("Erro ao carregar dados");

  return;

}

// =========================
// FILTROS DINÂMICOS
// =========================

const setTipo = new Set();
const setSoma = new Set();
const setAlim = new Set();
const setSGM = new Set();

dados.forEach(p => {

  p.tipo =
    (p.tipo || "").trim();

  p.soma =
    (p.soma || "")
    .trim()
    .toUpperCase();

  p.sgm =
    (p.sgm || "").trim();

  p.alimentador =
    (p.alimentador || "").trim();

  if(p.tipo){
    setTipo.add(p.tipo);
  }

  if(p.soma){
    setSoma.add(p.soma);
  }

  if(p.sgm){
    setSGM.add(p.sgm);
  }

  if(p.alimentador){
    setAlim.add(p.alimentador);
  }

});

if(
  !document.getElementById("tipo").options.length ||
  document.getElementById("tipo").options.length === 1
){

  preencher("tipo", setTipo);
  preencher("soma", setSoma);
  preencher("alim", setAlim);

}

// =========================
// MAPA
// =========================

coresTipo = {};

cluster.clearLayers();

let bounds = [];

contador.innerText =
  "Total: " + dados.length;

dados.forEach(p => {

  const lat = parseFloat(p.lat);
  const lon = parseFloat(p.lon);

  if(isNaN(lat) || isNaN(lon)){
    return;
  }

  bounds.push([lat, lon]);

  const marker = L.marker([lat,lon], {

    icon: L.divIcon({

      html: `
        <div style="
          width:14px;
          height:14px;
          background:${corTipo(p.tipo)};
          border-radius:50%;
          border:3px solid white;
        "></div>
      `

    }),

    dados: p

  });

  marker.bindPopup(`
    <b>OS:</b> ${p.os}<br>
    <b>Status:</b> ${p.status}<br>
    <b>Tipo:</b> ${p.tipo}<br>
    <b>Alimentador:</b> ${p.alimentador}<br>
    <b>Criticidade:</b> ${p.criticidade}<br>
    <b>Tag:</b> ${p.tag}<br>
    <b>OS SGM:</b> ${p.sgm}<br>
  `);

  marker.on('click', function (e) {

    const sgm =
      this.options.dados.sgm;

    if(e.originalEvent.ctrlKey){

      if(!selecionadosClick.includes(sgm)){
        selecionadosClick.push(sgm);
      }

    } else {

      selecionadosClick = [sgm];

    }

    const texto =
      selecionadosClick.join(", ");

    document.getElementById("listaOS")
      .innerText = texto;

    navigator.clipboard.writeText(texto);

  });

  cluster.addLayer(marker);

});

if(bounds.length){
  map.fitBounds(bounds);
}

// =========================
// LEGENDA
// =========================

if(legendaVisivel){
  atualizarLegenda();
}

// =========================
// FILTROS ATIVOS
// =========================

let ativos = [];

if(busca){
  ativos.push("OS: " + busca);
}

if(crit){
  ativos.push("Crit: " + crit);
}

if(tipo){
  ativos.push("Tipo: " + tipo);
}

if(soma){
  ativos.push("Soma: " + soma);
}

if(sgm){
  ativos.push("SGM: " + sgm);
}

if(alim.length){
  ativos.push("Alim: " + alim.join(", "));
}

document.getElementById("filtrosAtivos")
  .innerText =
    ativos.length
    ? "Filtros: " + ativos.join(" | ")
    : "";

}


  window.onload = () => {

  if(localStorage.getItem("auth") === "true"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    init();
    selectAlim = new TomSelect(
  "#alim",
  {
    plugins:['remove_button'],

    placeholder:
      "Selecione alimentadores",

    maxOptions:5000
  }
);
    carregar();
  }

};
 document.addEventListener("keydown", (e) => {

  const appVisivel = document.getElementById("app").style.display !== "none";
  const digitando = ["INPUT", "SELECT", "TEXTAREA"].includes(e.target.tagName);

  if (e.key === "Escape" && appVisivel && !digitando) {
    limparSelecao();
  }

});
  document.addEventListener("keydown", e=>{
  const loginVisible = document.getElementById("login").style.display !== "none";

  if(e.key === "Enter" && loginVisible){
    login();
  }
});
</script>

</body>
</html>
